<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Scenario Architect</title>
    <script src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            overflow: hidden;
            background: #e8ecef;
            user-select: none;
            -webkit-user-select: none;
        }

        /* ─── ネットワークキャンバス ─────────────────────────────
         * position: absolute + 明示的な top/left/width/height で
         * vis-network が getBoundingClientRect() でキャンバス位置を
         * 取得する際のオフセットを排除し、タップ座標の変換を正確にする。
         * (document flow に依存すると一部ブラウザで微妙なズレが生じる)
         * ─────────────────────────────────────────────────────── */
        #network {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
        }

        /* ─── タブバー ──────────────────────────────────────────── */
        .tab-bar {
            position: absolute; top: 0; left: 0; right: 0;
            height: 52px; z-index: 300;
            background: rgba(22, 33, 44, 0.94);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255,255,255,0.07);
            display: flex; align-items: center; gap: 7px; padding: 0 10px;
            /* iOS でも慣性スクロールさせる */
            overflow-x: auto; overflow-y: hidden;
            -webkit-overflow-scrolling: touch;
            scrollbar-width: none;
        }
        .tab-bar::-webkit-scrollbar { display: none; }

        .tab-sep {
            flex-shrink: 0;
            width: 1px; height: 24px;
            background: rgba(255,255,255,0.15);
        }

        .btn {
            flex-shrink: 0;
            padding: 7px 12px; border-radius: 7px; border: none;
            color: white; font-weight: 600; font-size: 12px;
            cursor: pointer; white-space: nowrap; line-height: 1;
            transition: filter 0.12s, transform 0.1s;
        }
        .btn:hover   { filter: brightness(1.2);  transform: translateY(-1px); }
        .btn:active  { filter: brightness(0.9);  transform: translateY(0);    }
        .btn:disabled { opacity: 0.35; cursor: not-allowed;
                        filter: none !important; transform: none !important; }

        /* ─── ミニマップ ────────────────────────────────────────
         * スクロール / ズーム中と、終了後 miniHideDelay ms の間のみ表示。
         * ノード以外をタップすると即座に非表示。
         * opacity + pointer-events の組み合わせで制御し、
         * 非表示時はキャンバスへのタッチ操作を妨げない。
         * ─────────────────────────────────────────────────────── */
        #minimap {
            position: absolute;
            top: 62px;   /* タブバー(52px) + 余白(10px) */
            right: 12px;
            z-index: 200;
            border-radius: 10px;
            cursor: crosshair;
            opacity: 0;
            pointer-events: none;
            box-shadow: 0 4px 18px rgba(0,0,0,0.45);
            transition: opacity 0.22s ease;
        }
        #minimap.visible {
            opacity: 1;
            pointer-events: all;
        }

        /* ─── 編集パネル（ボトムシート）───────────────────────────
         * visibility + opacity + pointer-events の 3 点セットで
         * 非表示時はレンダリング・インタラクションを完全に無効化。
         * visibility に transition delay を付けて非表示アニメーション後に隠す。
         * ─────────────────────────────────────────────────────── */
        #edit-panel {
            position: absolute; bottom: 34px; left: 0; right: 0;
            background: white; padding: 16px;
            border-top: 3px solid #34495e;
            border-radius: 20px 20px 0 0;
            box-shadow: 0 -8px 24px rgba(0,0,0,0.12);
            z-index: 500;
            visibility: hidden; opacity: 0;
            transform: translateY(100%);
            pointer-events: none;
            transition:
                transform  0.28s cubic-bezier(0.2, 0.9, 0.3, 1),
                opacity    0.28s ease,
                visibility 0s    0.28s;
        }
        #edit-panel.open {
            visibility: visible; opacity: 1;
            transform: translateY(0);
            pointer-events: all;
            transition:
                transform  0.28s cubic-bezier(0.2, 0.9, 0.3, 1),
                opacity    0.28s ease,
                visibility 0s    0s;
        }
        #edit-panel .panel-label {
            font-size: 10px; font-weight: 700;
            letter-spacing: 0.12em; color: #aaa;
            text-transform: uppercase; margin-bottom: 10px;
        }
        #edit-panel textarea {
            width: 100%; height: 88px; padding: 10px 12px;
            font-size: 15px; line-height: 1.6; font-family: inherit;
            border: 1.5px solid #dde1e7; border-radius: 8px;
            resize: vertical; outline: none;
        }
        #edit-panel textarea:focus { border-color: #3498db; }

        #choice-config {
            margin-top: 10px; font-size: 14px; color: #555;
            display: none; align-items: center; gap: 8px;
        }
        #choice-config select {
            padding: 4px 10px; border: 1px solid #dde;
            border-radius: 6px; font-size: 14px;
        }
        #btn-close-panel {
            width: 100%; margin-top: 10px; padding: 10px;
            background: #ecf0f1; color: #555; border-radius: 8px;
            border: none; cursor: pointer; font-size: 14px; font-weight: 600;
        }
        #btn-close-panel:hover { background: #dfe4e6; }

        /* ─── コンテキストメニュー ─────────────────────────────── */
        #ctx-menu {
            display: none; position: absolute; z-index: 2000;
            background: white; border-radius: 12px;
            box-shadow: 0 8px 28px rgba(0,0,0,0.18);
            flex-direction: column; overflow: hidden; min-width: 155px;
        }
        .ctx-item {
            padding: 12px 16px; cursor: pointer; font-size: 14px;
            display: flex; align-items: center; gap: 10px;
        }
        .ctx-item:hover { background: #f5f7f9; }
        .ctx-item + .ctx-item { border-top: 1px solid #f0f0f0; }
        .ctx-item.danger { color: #e74c3c; }

        /* ─── ステータスバー ─────────────────────────────────── */
        #status-bar {
            position: absolute; bottom: 0; left: 0; right: 0; height: 34px;
            background: rgba(18, 28, 38, 0.93);
            backdrop-filter: blur(4px);
            display: flex; align-items: center;
            padding: 0 14px; gap: 10px;
            font-size: 11px; color: #ccc; z-index: 400;
        }
        .st-sep  { opacity: 0.2; }
        .st-hint { margin-left: auto; opacity: 0.4; font-size: 10px; }
    </style>
</head>
<body>

<!-- ─── タブバー ─────────────────────────────────────────────── -->
<div class="tab-bar">
    <button class="btn" style="background:#2980b9" onclick="App.createNode('text')">＋ テキスト</button>
    <button class="btn" style="background:#c0392b" onclick="App.createNode('choice')">＋ 選択肢</button>
    <div class="tab-sep"></div>
    <button class="btn" style="background:#27ae60" onclick="App.exportJson()">💾 保存</button>
    <button class="btn" style="background:#7f8c8d" onclick="document.getElementById('file-input').click()">📂 読込</button>
    <button class="btn" style="background:#8e44ad" onclick="App.exportImage()">🖼 画像</button>
    <div class="tab-sep"></div>
    <button class="btn" style="background:#16a085" onclick="App.fitView()">🎯 全体表示</button>
    <div class="tab-sep"></div>
    <button class="btn" id="btn-undo" style="background:#5d6d7e" onclick="App.undo()" disabled>↩ 元に戻す</button>
    <button class="btn" id="btn-redo" style="background:#5d6d7e" onclick="App.redo()" disabled>↪ やり直す</button>
    <input type="file" id="file-input" style="display:none" accept=".json" onchange="App.importJson(event)">
</div>

<canvas id="minimap" width="200" height="130" title="ミニマップ — タップで移動"></canvas>
<div id="network"></div>

<!-- ─── 編集パネル ───────────────────────────────────────────── -->
<div id="edit-panel">
    <div class="panel-label" id="panel-label">NODE SETTINGS</div>
    <textarea id="panel-text" oninput="App.updateNodeText()" placeholder="本文を入力..."></textarea>
    <div id="choice-config">
        分岐数: <select id="choice-num" onchange="App.syncChoices()"></select>
    </div>
    <button id="btn-close-panel" onclick="App.closePanel()">完了</button>
</div>

<!-- ─── コンテキストメニュー ─────────────────────────────────── -->
<div id="ctx-menu">
    <div class="ctx-item" onclick="App.toggleLock()">🔒 ロック切替</div>
    <div class="ctx-item" onclick="App.copyNode()">📄 コピー</div>
    <div class="ctx-item danger" onclick="App.deleteNode()">🗑 削除</div>
</div>

<!-- ─── ステータスバー ───────────────────────────────────────── -->
<div id="status-bar">
    <span id="st-nodes">ノード: 0</span>
    <span class="st-sep">|</span>
    <span id="st-edges">接続: 0</span>
    <span class="st-hint">クリック: 選択 / 接続　長押し: メニュー　Del: 削除　Ctrl+Z/Y: Undo/Redo</span>
</div>

<script>
// ════════════════════════════════════════════════════════════
//  定数
// ════════════════════════════════════════════════════════════
const CFG = Object.freeze({
    // ノード描画
    nodeW:  188,
    titleH: 33,
    lineH:  17,
    pad:    11,

    // ミニマップ
    miniW:         200,
    miniH:         130,
    miniHideDelay: 1000,  // スクロール停止後に隠すまでの ms

    // カメラアニメーション時間 (ms)
    animFit:  400,
    animMove: 320,

    // スクロール可能領域 (±boundX / ±boundY)
    boundX: 4000,
    boundY: 3000,

    // 履歴
    maxHistory: 50,

    // インポート検証
    maxFileBytes: 2 * 1024 * 1024,
    maxNodes:     500,
    maxEdges:     2000,
    maxStrLen:    5000,
});

const NODE_COLORS = Object.freeze({
    text:   '#2980b9',
    choice: '#c0392b',
    option: '#e67e22',
    locked: '#95a5a6',
});

const NODE_LABELS = Object.freeze({
    text:   'TEXT',
    choice: 'CHOICE',
    option: 'OPTION',
});

const ALLOWED_TYPES = new Set(['text', 'choice', 'option']);

// ════════════════════════════════════════════════════════════
//  描画ユーティリティ
// ════════════════════════════════════════════════════════════

/** 角丸矩形パスを ctx に積む */
function roundRectPath(ctx, x, y, w, h, r) {
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.lineTo(x + w - r, y);  ctx.arcTo(x + w, y,     x + w, y + r,     r);
    ctx.lineTo(x + w, y + h - r); ctx.arcTo(x + w, y + h, x + w - r, y + h, r);
    ctx.lineTo(x + r, y + h);  ctx.arcTo(x,     y + h, x,       y + h - r, r);
    ctx.lineTo(x, y + r);      ctx.arcTo(x,     y,     x + r,   y,         r);
    ctx.closePath();
}

/**
 * vis-network ctxRenderer ファクトリ。
 * nodesDS を参照クロージャとして持つため、DataSet 生成後に呼ぶ。
 *
 * x, y はネットワーク座標系（canvas の transform が適用済みの ctx で描画する）。
 * nodeDimensions もネットワーク座標系で返し、vis-network の
 * バウンディングボックス計算（= タップ判定）と一致させる。
 */
function createCtxRenderer(nodesDS) {
    return function ctxRenderer({ ctx, id, x, y, state: { selected } }) {
        const nd = nodesDS.get(id);
        if (!nd) return { drawNode() {}, nodeDimensions: { width: CFG.nodeW, height: 80 } };

        const { type = 'text', fixed = false, rawText = '', label = '' } = nd;
        const lines  = (rawText || label).split('\n').slice(0, 4);
        const bodyH  = Math.max(50, lines.length * CFG.lineH + CFG.pad * 2);
        const H      = CFG.titleH + bodyH;
        const W      = CFG.nodeW;
        const lx     = x - W / 2;
        const ty     = y - H / 2;
        const color  = fixed ? NODE_COLORS.locked : (NODE_COLORS[type] || '#7f8c8d');

        return {
            drawNode() {
                // 影 + 背景
                ctx.save();
                ctx.shadowColor = 'rgba(0,0,0,0.12)';
                ctx.shadowBlur  = selected ? 14 : 8;
                ctx.shadowOffsetY = 3;
                ctx.fillStyle = selected ? '#eef6ff' : '#fff';
                roundRectPath(ctx, lx, ty, W, H, 8);
                ctx.fill();
                ctx.restore();

                // 外枠
                ctx.strokeStyle = selected ? color : color + 'aa';
                ctx.lineWidth   = selected ? 2.5 : 1.5;
                roundRectPath(ctx, lx, ty, W, H, 8);
                ctx.stroke();

                // タイトルバー（角丸でクリップして枠外に出ないようにする）
                ctx.save();
                roundRectPath(ctx, lx, ty, W, H, 8);
                ctx.clip();
                ctx.fillStyle = color;
                ctx.fillRect(lx, ty, W, CFG.titleH);
                ctx.restore();

                // タイトルテキスト
                ctx.save();
                ctx.fillStyle    = 'white';
                ctx.font         = 'bold 11px -apple-system,sans-serif';
                ctx.textBaseline = 'middle';
                ctx.textAlign    = 'left';
                ctx.fillText(NODE_LABELS[type] || 'NODE', lx + 10, ty + CFG.titleH / 2);
                if (fixed) {
                    ctx.textAlign = 'right';
                    ctx.fillText('[locked]', lx + W - 8, ty + CFG.titleH / 2);
                }
                ctx.restore();

                // 本文テキスト
                ctx.save();
                ctx.fillStyle    = '#444';
                ctx.font         = '12px -apple-system,sans-serif';
                ctx.textAlign    = 'left';
                ctx.textBaseline = 'top';
                lines.forEach((line, i) => {
                    if (line.length > 22) line = line.slice(0, 21) + '...';
                    ctx.fillText(line || ' ', lx + CFG.pad, ty + CFG.titleH + CFG.pad + i * CFG.lineH);
                });
                ctx.restore();
            },
            // バウンディングボックス（タップ判定）と描画を一致させる
            nodeDimensions: { width: W, height: H },
        };
    };
}

/**
 * JSON 保存 / Undo 復元時に関数は消えるため、
 * ロード後に必ずこの関数を通して renderer を再付与する。
 */
function attachRenderer(data, renderer) {
    const { ctxRenderer: _, shape: __, ...rest } = data;
    return { shape: 'custom', ctxRenderer: renderer, ...rest };
}

// ════════════════════════════════════════════════════════════
//  入力検証 & サニタイズ
//  (GitHub Pages 一般公開のため破損 / 不正データを排除する)
// ════════════════════════════════════════════════════════════

function sanitizeStr(val, maxLen) {
    const s = typeof val === 'string' ? val : String(val ?? '');
    // 表示に使わない制御文字を除去してから長さを制限
    return s.replace(/[\x00-\x08\x0B\x0C\x0E-\x1F\x7F]/g, '').slice(0, maxLen);
}

function clampNum(v, lo, hi, fallback) {
    const n = Number(v);
    return isFinite(n) ? Math.max(lo, Math.min(hi, n)) : fallback;
}

function validateImport(raw) {
    if (raw.length > CFG.maxFileBytes)
        throw new Error('ファイルサイズが上限 (2 MB) を超えています');

    let data;
    try   { data = JSON.parse(raw); }
    catch { throw new Error('JSON パースに失敗しました（ファイルが破損している可能性があります）'); }

    if (typeof data !== 'object' || data === null || Array.isArray(data))
        throw new Error('不正なフォーマット: トップレベルはオブジェクトが必要です');
    if (!Array.isArray(data.nodes))
        throw new Error('"nodes" が配列ではありません');
    if (data.nodes.length > CFG.maxNodes)
        throw new Error(`ノード数が上限 (${CFG.maxNodes}) を超えています`);

    const knownIds = new Set();

    const nodes = data.nodes.map((n, i) => {
        if (typeof n !== 'object' || n === null)
            throw new Error(`nodes[${i}]: 不正な値です`);

        const id = sanitizeStr(String(n.id ?? ''), 150);
        if (!id)               throw new Error(`nodes[${i}]: id が空です`);
        if (knownIds.has(id))  throw new Error(`nodes[${i}]: id "${id}" が重複しています`);
        knownIds.add(id);

        if (!ALLOWED_TYPES.has(n.type))
            throw new Error(`nodes[${i}]: 不正な type "${n.type}"`);

        const out = {
            id,
            type:    n.type,
            rawText: sanitizeStr(n.rawText, CFG.maxStrLen),
            label:   sanitizeStr(n.label,   500),
            x:       clampNum(n.x, -CFG.boundX, CFG.boundX, 0),
            y:       clampNum(n.y, -CFG.boundY, CFG.boundY, 0),
            fixed:   Boolean(n.fixed),
        };

        if (n.type === 'choice') {
            out.childCount = clampNum(n.childCount, 1, 9, 2);
            if (Array.isArray(n.childIds))
                out.childIds = n.childIds
                    .map(s => sanitizeStr(String(s), 150)).filter(Boolean).slice(0, 9);
            if (n.childOffsets && typeof n.childOffsets === 'object' && !Array.isArray(n.childOffsets))
                out.childOffsets = Object.fromEntries(
                    Object.entries(n.childOffsets)
                        .filter(([, v]) => v && typeof v === 'object')
                        .map(([k, v]) => [sanitizeStr(k, 150), {
                            x: clampNum(v.x, -2000, 2000, 240),
                            y: clampNum(v.y, -2000, 2000, 0),
                        }])
                );
        }
        return out;
    });

    if (!Array.isArray(data.edges))
        throw new Error('"edges" が配列ではありません');
    if (data.edges.length > CFG.maxEdges)
        throw new Error(`エッジ数が上限 (${CFG.maxEdges}) を超えています`);

    const edges = data.edges.map((e, i) => {
        if (typeof e !== 'object' || e === null)
            throw new Error(`edges[${i}]: 不正な値です`);
        const from = sanitizeStr(String(e.from ?? ''), 150);
        const to   = sanitizeStr(String(e.to   ?? ''), 150);
        if (!knownIds.has(from)) throw new Error(`edges[${i}]: 存在しない from ノード "${from}"`);
        if (!knownIds.has(to))   throw new Error(`edges[${i}]: 存在しない to ノード "${to}"`);
        if (from === to)         throw new Error(`edges[${i}]: 自己ループは許可されていません`);
        return { from, to };
    });

    return { nodes, edges };
}

// ════════════════════════════════════════════════════════════
//  アプリ本体
// ════════════════════════════════════════════════════════════
const App = (() => {

    // ─── データ ──────────────────────────────────────────────
    const nodesDS = new vis.DataSet([]);
    const edgesDS = new vis.DataSet([]);
    let   network = null;

    // ─── UI 状態 ─────────────────────────────────────────────
    let pendingFrom = null;   // 接続元として選択中のノード ID
    let ctxTargetId = null;   // コンテキストメニューのターゲット

    // ─── 履歴 ────────────────────────────────────────────────
    let undoStack = [];
    let redoStack = [];

    // ─── ミニマップ ──────────────────────────────────────────
    const minimapEl  = document.getElementById('minimap');
    const minimapCtx = minimapEl.getContext('2d');
    let   minimapTimer = null;

    // ─── ctxRenderer（DataSet 参照が必要なため init 前に生成） ─
    let renderer = null;

    // ─── 選択肢数セレクト初期化 ──────────────────────────────
    const choiceNumSel = document.getElementById('choice-num');
    for (let i = 1; i <= 9; i++) choiceNumSel.add(new Option(i, i));

    // ════════════════════════════════════════════════════════
    //  ミニマップ
    //
    //  【表示ルール】
    //   - ドラッグ / ズーム中: showMinimap() で即座に表示
    //   - ミニマップクリック / fitView() 実行時: showMinimap() で表示
    //   - 操作終了 → miniHideDelay ms 後に自動非表示 (scheduleMinimap)
    //   - ノード以外をタップ → 即座に非表示 (hideMinimap)
    //
    //  【更新ルール】
    //   vis-network の afterDrawing イベントで毎フレーム再描画。
    //   これにより moveTo() / fit() のアニメーション中も
    //   ビューポート枠がリアルタイムで追従する。
    // ════════════════════════════════════════════════════════

    function showMinimap() {
        clearTimeout(minimapTimer);
        minimapEl.classList.add('visible');
    }

    function hideMinimap() {
        minimapEl.classList.remove('visible');
    }

    /** 一定時間後に自動非表示を予約する */
    function scheduleMinimap() {
        clearTimeout(minimapTimer);
        minimapTimer = setTimeout(hideMinimap, CFG.miniHideDelay);
    }

    /** ミニマップ Canvas を再描画する（表示中に毎フレーム呼ばれる）*/
    function drawMinimap() {
        const { miniW: W, miniH: H, boundX: BX, boundY: BY } = CFG;
        const toMX = nx => (nx + BX) / (BX * 2) * W;
        const toMY = ny => (ny + BY) / (BY * 2) * H;

        minimapCtx.clearRect(0, 0, W, H);

        // 背景
        minimapCtx.fillStyle = 'rgba(14,24,34,0.92)';
        roundRectPath(minimapCtx, 0, 0, W, H, 10);
        minimapCtx.fill();

        // 枠
        minimapCtx.strokeStyle = 'rgba(255,255,255,0.10)';
        minimapCtx.lineWidth   = 1;
        roundRectPath(minimapCtx, 0.5, 0.5, W - 1, H - 1, 10);
        minimapCtx.stroke();

        const positions = network.getPositions();

        // エッジ
        minimapCtx.strokeStyle = 'rgba(180,196,212,0.20)';
        minimapCtx.lineWidth   = 0.7;
        edgesDS.get().forEach(({ from, to }) => {
            const fp = positions[from], tp = positions[to];
            if (!fp || !tp) return;
            minimapCtx.beginPath();
            minimapCtx.moveTo(toMX(fp.x), toMY(fp.y));
            minimapCtx.lineTo(toMX(tp.x), toMY(tp.y));
            minimapCtx.stroke();
        });

        // ノード
        nodesDS.get().forEach(nd => {
            const p = positions[nd.id]; if (!p) return;
            minimapCtx.fillStyle = nd.fixed ? NODE_COLORS.locked : (NODE_COLORS[nd.type] || '#7f8c8d');
            minimapCtx.beginPath();
            minimapCtx.arc(toMX(p.x), toMY(p.y), nd.type === 'option' ? 2.2 : 3.2, 0, Math.PI * 2);
            minimapCtx.fill();
        });

        // ビューポート枠（現在見ている範囲を白い矩形で表示）
        const scale = network.getScale();
        const vp    = network.getViewPosition();
        const vw    = window.innerWidth  / scale;
        const vh    = window.innerHeight / scale;
        const rx = Math.max(1,     toMX(vp.x - vw / 2));
        const ry = Math.max(1,     toMY(vp.y - vh / 2));
        const rw = Math.min(W - rx - 1, vw / (BX * 2) * W);
        const rh = Math.min(H - ry - 1, vh / (BY * 2) * H);

        minimapCtx.strokeStyle = 'rgba(255,255,255,0.65)';
        minimapCtx.lineWidth   = 1.5;
        minimapCtx.strokeRect(rx, ry, rw, rh);

        // ラベル
        minimapCtx.fillStyle    = 'rgba(255,255,255,0.25)';
        minimapCtx.font         = 'bold 8px sans-serif';
        minimapCtx.textAlign    = 'right';
        minimapCtx.textBaseline = 'bottom';
        minimapCtx.fillText('MINIMAP', W - 6, H - 5);
    }

    // ════════════════════════════════════════════════════════
    //  スクロール制限
    // ════════════════════════════════════════════════════════

    function enforceBounds() {
        const { x, y } = network.getViewPosition();
        const cx = Math.max(-CFG.boundX, Math.min(CFG.boundX, x));
        const cy = Math.max(-CFG.boundY, Math.min(CFG.boundY, y));
        if (cx !== x || cy !== y)
            network.moveTo({ position: { x: cx, y: cy },
                             animation: { duration: 180, easingFunction: 'easeOutQuad' } });
    }

    // ════════════════════════════════════════════════════════
    //  Undo / Redo
    // ════════════════════════════════════════════════════════

    function snapshot() {
        const pos = network?.getPositions() ?? {};
        return JSON.stringify({
            nodes: nodesDS.get().map(({ ctxRenderer: _, shape: __, ...n }) => ({
                ...n, x: pos[n.id]?.x ?? n.x, y: pos[n.id]?.y ?? n.y,
            })),
            edges: edgesDS.get(),
        });
    }

    function saveState() {
        undoStack.push(snapshot());
        if (undoStack.length > CFG.maxHistory) undoStack.shift();
        redoStack = [];
        syncHistoryButtons();
    }

    function applySnapshot(json) {
        const { nodes: ns, edges: es } = JSON.parse(json);
        nodesDS.clear();
        edgesDS.clear();
        edgesDS.add(es ?? []);
        nodesDS.add((ns ?? []).map(n => attachRenderer(n, renderer)));
        pendingFrom = null;
        closePanel();
        syncStatus();
    }

    function syncHistoryButtons() {
        document.getElementById('btn-undo').disabled = undoStack.length === 0;
        document.getElementById('btn-redo').disabled = redoStack.length === 0;
    }

    function undo() {
        if (!undoStack.length) return;
        redoStack.push(snapshot());
        applySnapshot(undoStack.pop());
        syncHistoryButtons();
    }

    function redo() {
        if (!redoStack.length) return;
        undoStack.push(snapshot());
        applySnapshot(redoStack.pop());
        syncHistoryButtons();
    }

    // ════════════════════════════════════════════════════════
    //  ノード操作
    // ════════════════════════════════════════════════════════

    function makeNode(data) {
        return attachRenderer(data, renderer);
    }

    function createNode(type) {
        saveState();
        const id     = `${type}_${Date.now()}`;
        const center = network.getViewPosition();
        nodesDS.add(makeNode({
            id, type, rawText: '', label: '...',
            x: center.x, y: center.y, fixed: false,
        }));
        if (type === 'choice') setTimeout(() => buildChoiceChildren(id, 2), 50);
        pendingFrom = null;
        openPanel(nodesDS.get(id));
    }

    /**
     * CHOICE の子 OPTION を再構築する。
     * 既存の子を削除してから count 個生成し直し、
     * childIds / childOffsets を親ノードに記録する。
     */
    function buildChoiceChildren(parentId, count) {
        const parent = nodesDS.get(parentId);
        if (!parent) return;
        const pos = network.getPositions([parentId])[parentId] ?? { x: 0, y: 0 };

        const oldIds = parent.childIds ?? [];
        if (oldIds.length) {
            nodesDS.remove(oldIds);
            edgesDS.remove(edgesDS.get({ filter: e => oldIds.includes(e.to) }).map(e => e.id));
        }

        const childIds = [], offsets = {};
        for (let i = 1; i <= count; i++) {
            const cid = `opt_${parentId}_${i}`;
            const ox  = 240;
            const oy  = (i - (count + 1) / 2) * 110;
            nodesDS.add(makeNode({
                id: cid, type: 'option',
                rawText: `選択肢${i}`, label: `選択肢${i}`,
                x: pos.x + ox, y: pos.y + oy, fixed: false,
            }));
            edgesDS.add({ from: parentId, to: cid });
            childIds.push(cid);
            offsets[cid] = { x: ox, y: oy };
        }
        nodesDS.update({ id: parentId, childIds, childOffsets: offsets, childCount: count });
    }

    function removeNode(id) {
        const n = nodesDS.get(id);
        if (!n) return;
        if (n.type === 'choice' && n.childIds?.length) {
            edgesDS.remove(edgesDS.get({ filter: e => n.childIds.includes(e.to) }).map(e => e.id));
            nodesDS.remove(n.childIds);
        }
        edgesDS.remove(edgesDS.get({ filter: e => e.from === id || e.to === id }).map(e => e.id));
        nodesDS.remove(id);
    }

    /**
     * 2 ノード間のエッジを追加/解除する。
     *
     * 【方向ルール】エッジは常に左から右（x 座標が小さい → 大きい）へ。
     * どちらのノードを先に選んでも同じエッジが対象になる。
     */
    function toggleEdge(aId, bId) {
        const pos = network.getPositions([aId, bId]);
        const ax  = pos[aId]?.x ?? 0;
        const bx  = pos[bId]?.x ?? 1;
        const [fromId, toId] = ax <= bx ? [aId, bId] : [bId, aId];

        const existing = edgesDS.get({ filter: e => e.from === fromId && e.to === toId });
        if (existing.length) edgesDS.remove(existing[0].id);
        else                 edgesDS.add({ from: fromId, to: toId });
    }

    // ════════════════════════════════════════════════════════
    //  編集パネル
    // ════════════════════════════════════════════════════════

    function openPanel(node) {
        document.getElementById('panel-label').textContent =
            (NODE_LABELS[node.type] ?? 'NODE') + ' SETTINGS';
        document.getElementById('panel-text').value = node.rawText ?? '';
        const cc = document.getElementById('choice-config');
        cc.style.display = node.type === 'choice' ? 'flex' : 'none';
        if (node.type === 'choice') choiceNumSel.value = node.childCount ?? 2;
        document.getElementById('edit-panel').classList.add('open');
        setTimeout(() => document.getElementById('panel-text').focus(), 300);
    }

    function closePanel() {
        document.getElementById('edit-panel').classList.remove('open');
    }

    // ════════════════════════════════════════════════════════
    //  ステータスバー
    // ════════════════════════════════════════════════════════

    function syncStatus() {
        document.getElementById('st-nodes').textContent = `ノード: ${nodesDS.length}`;
        document.getElementById('st-edges').textContent = `接続: ${edgesDS.length}`;
    }

    // ════════════════════════════════════════════════════════
    //  コンテキストメニュー
    // ════════════════════════════════════════════════════════

    const ctxMenuEl = document.getElementById('ctx-menu');

    function showCtxMenu(nodeId, domX, domY) {
        ctxTargetId = nodeId;
        Object.assign(ctxMenuEl.style, {
            display: 'flex',
            left:    `${domX}px`,
            top:     `${domY}px`,
        });
    }

    function hideCtxMenu() {
        ctxMenuEl.style.display = 'none';
    }

    // ════════════════════════════════════════════════════════
    //  vis-network 初期化
    // ════════════════════════════════════════════════════════

    function init() {
        renderer = createCtxRenderer(nodesDS);

        network = new vis.Network(
            document.getElementById('network'),
            { nodes: nodesDS, edges: edgesDS },
            {
                nodes: { shape: 'custom', ctxRenderer: renderer },
                edges: {
                    arrows: { to: { enabled: true, scaleFactor: 0.75 } },
                    color:  { color: '#b0bec5', highlight: '#2980b9', hover: '#78909c' },
                    smooth: { type: 'cubicBezier', forceDirection: 'horizontal', roundness: 0.4 },
                    width: 1.5, hoverWidth: 2,
                },
                physics: { enabled: false },
                // false にしないと複数ノードが同時選択され
                // 意図しない一括ドラッグが起きる
                interaction: { hover: true, multiselect: false, dragView: true, zoomView: true },
            }
        );

        // ── afterDrawing: ミニマップを毎フレーム更新 ──────────────
        // moveTo() / fit() のアニメーション中も含め、
        // vis-network が描画するたびにミニマップを再描画することで
        // ビューポート枠が常に現在位置を正確に反映する。
        network.on('afterDrawing', () => {
            if (minimapEl.classList.contains('visible')) drawMinimap();
        });

        // ── dragging: ミニマップ表示 & CHOICE 子ノード追従 ─────────
        network.on('dragging', ({ nodes: nds }) => {
            showMinimap();
            if (!nds.length) return;
            const parent = nodesDS.get(nds[0]);
            if (!parent || parent.type !== 'choice' || !parent.childIds?.length) return;
            const pPos = network.getPositions([nds[0]])[nds[0]];
            nodesDS.update(parent.childIds.map(cid => {
                const off = parent.childOffsets?.[cid] ?? { x: 240, y: 0 };
                return { id: cid, x: pPos.x + off.x, y: pPos.y + off.y };
            }));
        });

        // ── dragEnd: OPTION オフセット記録 & 後処理 ─────────────────
        network.on('dragEnd', ({ nodes: nds }) => {
            scheduleMinimap();
            enforceBounds();
            if (!nds.length) return;
            const moved = nodesDS.get(nds[0]);
            if (moved?.type !== 'option') return;
            const parentEdge = edgesDS.get({ filter: e => e.to === nds[0] })[0];
            if (!parentEdge) return;
            const parent = nodesDS.get(parentEdge.from);
            if (!parent || parent.type !== 'choice') return;
            const pos = network.getPositions([parent.id, nds[0]]);
            nodesDS.update({
                id: parent.id,
                childOffsets: {
                    ...(parent.childOffsets ?? {}),
                    [nds[0]]: {
                        x: pos[nds[0]].x - pos[parent.id].x,
                        y: pos[nds[0]].y - pos[parent.id].y,
                    },
                },
            });
        });

        // ── zoom: ミニマップ表示 & スクロール制限 ────────────────────
        network.on('zoom', () => {
            showMinimap();
            scheduleMinimap();
            enforceBounds();
        });

        // ── click: 接続操作 ──────────────────────────────────────────
        network.on('click', ({ nodes: nds }) => {
            hideCtxMenu();
            hideMinimap();   // ノード以外をタップしたら即座に非表示

            const id = nds[0];
            if (id) {
                if (pendingFrom && pendingFrom !== id) {
                    // 別ノードが選択中 → 接続 / 解除
                    saveState();
                    toggleEdge(pendingFrom, id);
                    pendingFrom = null;
                    closePanel();
                } else {
                    pendingFrom = id;
                    const nd = nodesDS.get(id);
                    if (nd && !nd.fixed) openPanel(nd);
                }
            } else {
                pendingFrom = null;
                closePanel();
            }
        });

        // ── hold: コンテキストメニュー ───────────────────────────────
        network.on('hold', ({ nodes: nds, pointer }) => {
            if (!nds.length) return;
            showCtxMenu(nds[0], pointer.DOM.x, pointer.DOM.y);
        });

        // ── DataSet 変更 → ステータス更新 ───────────────────────────
        nodesDS.on('*', syncStatus);
        edgesDS.on('*', syncStatus);
        syncStatus();
    }

    // ════════════════════════════════════════════════════════
    //  ナビゲーション
    // ════════════════════════════════════════════════════════

    /**
     * 全ノードが収まるようビューを調整する。
     * ミニマップを表示し、アニメーション中 afterDrawing で更新、
     * 完了後 miniHideDelay ms で自動非表示。
     */
    function fitView() {
        showMinimap();
        const anim = { duration: CFG.animFit, easingFunction: 'easeInOutQuad' };
        if (nodesDS.length) {
            network.fit({ animation: anim });
        } else {
            network.moveTo({ position: { x: 0, y: 0 }, scale: 1, animation: anim });
        }
        clearTimeout(minimapTimer);
        minimapTimer = setTimeout(hideMinimap, CFG.animFit + CFG.miniHideDelay);
    }

    // ミニマップクリック → その座標へカメラをジャンプ
    minimapEl.addEventListener('click', e => {
        if (!network) return;
        const rect = minimapEl.getBoundingClientRect();
        const mx   = (e.clientX - rect.left) / CFG.miniW;
        const my   = (e.clientY - rect.top)  / CFG.miniH;
        showMinimap();
        network.moveTo({
            position:  { x: mx * CFG.boundX * 2 - CFG.boundX, y: my * CFG.boundY * 2 - CFG.boundY },
            animation: { duration: CFG.animMove, easingFunction: 'easeInOutQuad' },
        });
        clearTimeout(minimapTimer);
        minimapTimer = setTimeout(hideMinimap, CFG.animMove + CFG.miniHideDelay);
    });

    // ════════════════════════════════════════════════════════
    //  Import / Export
    // ════════════════════════════════════════════════════════

    function download(href, filename) {
        const a = Object.assign(document.createElement('a'), { href, download: filename });
        document.body.appendChild(a); a.click(); a.remove();
    }

    function isoDate() { return new Date().toISOString().slice(0, 10); }

    function exportJson() {
        const pos = network.getPositions();
        const ns  = nodesDS.get().map(({ ctxRenderer: _, shape: __, ...n }) => ({
            ...n, x: pos[n.id]?.x ?? n.x, y: pos[n.id]?.y ?? n.y,
        }));
        const blob = new Blob(
            [JSON.stringify({ nodes: ns, edges: edgesDS.get() }, null, 2)],
            { type: 'application/json' }
        );
        download(URL.createObjectURL(blob), `scenario_${isoDate()}.json`);
    }

    function importJson(event) {
        const file = event.target.files[0];
        if (!file) return;
        event.target.value = '';
        const reader = new FileReader();
        reader.onload = ev => {
            try {
                const { nodes: ns, edges: es } = validateImport(ev.target.result);
                saveState();
                nodesDS.clear(); edgesDS.clear();
                edgesDS.add(es);
                nodesDS.add(ns.map(n => makeNode(n)));
                network.fit({ animation: true });
            } catch (err) {
                alert('読込エラー\n\n' + err.message);
            }
        };
        reader.readAsText(file);
    }

    function exportImage() {
        download(network.canvas.frame.canvas.toDataURL('image/png'), `scenario_${isoDate()}.png`);
    }

    // ════════════════════════════════════════════════════════
    //  キーボードショートカット
    // ════════════════════════════════════════════════════════
    document.addEventListener('keydown', e => {
        if (['TEXTAREA', 'INPUT', 'SELECT'].includes(e.target.tagName)) return;
        const ctrl = e.ctrlKey || e.metaKey;

        if ((e.key === 'Delete' || e.key === 'Backspace') && pendingFrom) {
            saveState();
            const id = pendingFrom;
            pendingFrom = null;
            closePanel();
            removeNode(id);
        }
        if (ctrl && !e.shiftKey && e.key === 'z') { e.preventDefault(); undo(); }
        if (ctrl && (e.key === 'y' || (e.shiftKey && e.key === 'z'))) { e.preventDefault(); redo(); }
    });

    // コンテキストメニュー外タップで閉じる
    document.addEventListener('click', e => {
        if (!ctxMenuEl.contains(e.target)) hideCtxMenu();
    });

    // ════════════════════════════════════════════════════════
    //  公開 API (HTML の onclick から呼び出す)
    // ════════════════════════════════════════════════════════
    return {
        init,

        // ノード作成
        createNode,

        // 編集パネル
        closePanel,
        updateNodeText() {
            if (!pendingFrom) return;
            const text = document.getElementById('panel-text').value;
            nodesDS.update({ id: pendingFrom, rawText: text, label: text || ' ' });
        },
        syncChoices() {
            saveState();
            buildChoiceChildren(pendingFrom, parseInt(choiceNumSel.value));
        },

        // コンテキストメニュー操作
        toggleLock() {
            if (!ctxTargetId) return;
            saveState();
            const n = nodesDS.get(ctxTargetId);
            nodesDS.update({ id: ctxTargetId, fixed: !n.fixed });
            hideCtxMenu(); closePanel();
        },
        copyNode() {
            const n = nodesDS.get(ctxTargetId);
            if (!n || n.type === 'option') return;
            saveState();
            const pos   = network.getPositions([ctxTargetId])[ctxTargetId];
            const newId = `${n.type}_${Date.now()}_cp`;
            nodesDS.add(makeNode({
                id: newId, type: n.type,
                rawText: n.rawText, label: n.label,
                x: pos.x + 30, y: pos.y + 30, fixed: false,
            }));
            if (n.type === 'choice') setTimeout(() => buildChoiceChildren(newId, n.childCount ?? 2), 50);
            hideCtxMenu();
        },
        deleteNode() {
            if (!ctxTargetId) return;
            saveState();
            const id = ctxTargetId;
            if (pendingFrom === id) { pendingFrom = null; closePanel(); }
            removeNode(id);
            hideCtxMenu();
        },

        // Undo / Redo
        undo, redo,

        // ナビゲーション
        fitView,

        // IO
        exportJson, importJson, exportImage,
    };
})();

App.init();
</script>
</body>
</html>
