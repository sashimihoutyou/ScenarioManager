<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Scenario Architect</title>
    <script src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>
    <style>
        :root {
            --app-height: 100vh;
            --tab-bar-height: 52px;
            --status-bar-height: 34px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            overflow: hidden; background: #e8ecef;
            user-select: none; -webkit-user-select: none;
            height: var(--app-height);
        }

        /* ── ネットワークキャンバス ────────────────────────────
         * position: absolute で document flow から切り離し、
         * vis-network の getBoundingClientRect() によるタップ座標
         * 変換を正確にする。
         * ─────────────────────────────────────────────────── */
        #network {
            position: absolute;
            top: var(--tab-bar-height);
            bottom: var(--status-bar-height);
            left: 0;
            width: 100%;
        }

        /* ── タブバー ───────────────────────────────────────── */
        .tab-bar {
            position: absolute; top: 0; left: 0; right: 0;
            height: var(--tab-bar-height); z-index: 300;
            background: rgba(22,33,44,0.94);
            backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255,255,255,0.07);
            display: flex; align-items: center; gap: 7px; padding: 0 10px;
            overflow-x: auto; overflow-y: hidden;
            -webkit-overflow-scrolling: touch; scrollbar-width: none;
        }
        .tab-bar::-webkit-scrollbar { display: none; }
        .tab-sep { flex-shrink: 0; width: 1px; height: 24px; background: rgba(255,255,255,0.15); }

        .btn {
            flex-shrink: 0; padding: 7px 12px; border-radius: 7px; border: none;
            color: white; font-weight: 600; font-size: 12px;
            cursor: pointer; white-space: nowrap; line-height: 1;
            transition: filter 0.12s, transform 0.1s;
        }
        .btn:hover   { filter: brightness(1.2);  transform: translateY(-1px); }
        .btn:active  { filter: brightness(0.9);  transform: translateY(0);    }
        .btn:disabled { opacity: 0.35; cursor: not-allowed;
                        filter: none !important; transform: none !important; }

        /* ── ミニマップ ─────────────────────────────────────────
         * スクロール/ズーム中と終了後 miniHideDelay ms のみ表示。
         * ミニマップ以外をタップすると即座に非表示。
         * opacity + pointer-events で非表示時のタッチ干渉を防ぐ。
         *
         * 【更新方式】
         * afterDrawing は moveTo()/fit() のアニメーション中に
         * 安定して発火しないため、showMinimap() で RAF ループを
         * 起動し、visible 中は毎フレーム drawMinimap() を呼ぶ。
         * ─────────────────────────────────────────────────── */
        #minimap {
            position: absolute;
            top: calc(var(--tab-bar-height) + 10px);
            right: 12px;
            z-index: 200;
            border-radius: 10px; cursor: crosshair;
            opacity: 0; pointer-events: none;
            box-shadow: 0 4px 18px rgba(0,0,0,0.45);
            transition: opacity 0.22s ease;
        }
        #minimap.visible { opacity: 1; pointer-events: all; }

        /* ── 編集パネル（ボトムシート）──────────────────────────
         * visibility + opacity + pointer-events の三点セットで
         * 非表示時はレンダリング・インタラクションを完全に無効化。
         * visibility の transition delay でアニメーション完了後に隠す。
         * ─────────────────────────────────────────────────── */
        #edit-panel {
            position: absolute;
            bottom: var(--status-bar-height);
            left: 0;
            right: 0;
            background: white; padding: 16px;
            border-top: 3px solid #34495e; border-radius: 20px 20px 0 0;
            box-shadow: 0 -8px 24px rgba(0,0,0,0.12);
            z-index: 500;
            visibility: hidden; opacity: 0;
            transform: translateY(100%); pointer-events: none;
            transition: transform .28s cubic-bezier(.2,.9,.3,1), opacity .28s ease, visibility 0s .28s;
            max-height: calc(var(--app-height) - var(--tab-bar-height) - var(--status-bar-height) - 16px);
            overflow-y: auto;
        }
        #edit-panel.open {
            visibility: visible; opacity: 1;
            transform: translateY(0); pointer-events: all;
            transition: transform .28s cubic-bezier(.2,.9,.3,1), opacity .28s ease, visibility 0s 0s;
        }
        .panel-label {
            font-size: 10px; font-weight: 700; letter-spacing: .12em;
            color: #aaa; text-transform: uppercase; margin-bottom: 10px;
        }

        /* テキスト/選択肢ノード用 */
        #text-section textarea {
            width: 100%; height: 88px; padding: 10px 12px;
            font-size: 15px; line-height: 1.6; font-family: inherit;
            border: 1.5px solid #dde1e7; border-radius: 8px;
            resize: vertical; outline: none;
        }
        #text-section textarea:focus { border-color: #3498db; }
        #choice-config {
            margin-top: 10px; font-size: 14px; color: #555;
            display: none; align-items: center; gap: 8px;
        }
        #choice-config select { padding: 4px 10px; border: 1px solid #dde; border-radius: 6px; font-size: 14px; }

        /* 立ち絵ノード用 */
        #sprite-section { display: flex; flex-direction: column; gap: 9px; }
        .sprite-row { display: flex; align-items: center; gap: 8px; font-size: 14px; }
        .sprite-row label { width: 72px; flex-shrink: 0; color: #666; font-weight: 500; }
        .sprite-row input[type="text"],
        .sprite-row select {
            flex: 1; padding: 6px 10px;
            border: 1.5px solid #dde1e7; border-radius: 6px;
            font-size: 14px; font-family: inherit; outline: none;
        }
        .sprite-row input[type="text"]:focus,
        .sprite-row select:focus { border-color: #8e44ad; }

        #btn-close-panel {
            width: 100%; margin-top: 12px; padding: 10px;
            background: #ecf0f1; color: #555; border-radius: 8px;
            border: none; cursor: pointer; font-size: 14px; font-weight: 600;
        }
        #btn-close-panel:hover { background: #dfe4e6; }

        /* ── コンテキストメニュー ───────────────────────────── */
        #ctx-menu-node,
        #ctx-menu-canvas {
            display: none; position: absolute; z-index: 2000;
            background: white; border-radius: 12px;
            box-shadow: 0 8px 28px rgba(0,0,0,0.18);
            flex-direction: column; overflow: hidden; min-width: 155px;
        }
        .ctx-item {
            padding: 12px 16px; cursor: pointer; font-size: 14px;
            display: flex; align-items: center; gap: 10px;
        }
        .ctx-item:hover { background: #f5f7f9; }
        .ctx-item + .ctx-item { border-top: 1px solid #f0f0f0; }
        .ctx-item.danger { color: #e74c3c; }

        /* ── ステータスバー ─────────────────────────────────── */
        #status-bar {
            position: absolute; bottom: 0; left: 0; right: 0; height: var(--status-bar-height);
            background: rgba(18,28,38,.93); backdrop-filter: blur(4px);
            display: flex; align-items: center;
            padding: 0 14px; gap: 10px; font-size: 11px; color: #ccc; z-index: 400;
        }
        .st-sep  { opacity: .2; }
        .st-hint { margin-left: auto; opacity: .4; font-size: 10px; }

        body.is-mobile {
            --tab-bar-height: 48px;
            --status-bar-height: 30px;
        }

        @media (max-width: 768px) {
            .tab-bar { padding: 0 8px; gap: 6px; }
            .btn { padding: 6px 10px; font-size: 11px; }
            #minimap { width: 150px; height: 98px; right: 8px; }
            #edit-panel { border-radius: 14px 14px 0 0; padding: 12px; }
            #text-section textarea { font-size: 14px; height: 74px; }
            .st-hint { display: none; }
        }
    </style>
</head>
<body>

<!-- ── タブバー ─────────────────────────────────────────── -->
<div class="tab-bar">
    <button class="btn" style="background:#2980b9" onclick="App.createNode('text')">＋ テキスト</button>
    <button class="btn" style="background:#c0392b" onclick="App.createNode('choice')">＋ 選択肢</button>
    <button class="btn" style="background:#7d3c98" onclick="App.createNode('sprite')">＋ 立ち絵</button>
    <div class="tab-sep"></div>
    <button class="btn" style="background:#27ae60" onclick="App.exportJson()">💾 保存</button>
    <button class="btn" style="background:#7f8c8d" onclick="document.getElementById('file-input').click()">📂 読込</button>
    <button class="btn" style="background:#8e44ad" onclick="App.exportImage()">🖼 画像</button>
    <button class="btn" style="background:#1a5276" onclick="App.exportDialogic()">📤 Dialogic出力</button>
    <div class="tab-sep"></div>
    <button class="btn" style="background:#16a085" onclick="App.fitView()">🎯 全体表示</button>
    <div class="tab-sep"></div>
    <button class="btn" id="btn-undo" style="background:#5d6d7e" onclick="App.undo()" disabled>↩ 元に戻す</button>
    <button class="btn" id="btn-redo" style="background:#5d6d7e" onclick="App.redo()" disabled>↪ やり直す</button>
    <input type="file" id="file-input" style="display:none" accept=".json" onchange="App.importJson(event)">
</div>

<canvas id="minimap" width="200" height="130" title="ミニマップ — タップで移動"></canvas>
<div id="network"></div>

<!-- ── 編集パネル ────────────────────────────────────────── -->
<div id="edit-panel">
    <div class="panel-label" id="panel-label">NODE SETTINGS</div>

    <!-- TEXT / CHOICE ノード -->
    <div id="text-section">
        <textarea id="panel-text" oninput="App.updateNodeText()" placeholder="本文を入力..."></textarea>
        <div id="choice-config">
            分岐数: <select id="choice-num" onchange="App.syncChoices()"></select>
        </div>
    </div>

    <!-- SPRITE ノード -->
    <div id="sprite-section" style="display:none">
        <div class="sprite-row">
            <label>キャラ名</label>
            <input type="text" id="sprite-name" oninput="App.updateSpriteData()" placeholder="キャラクター名">
        </div>
        <div class="sprite-row">
            <label>立ち位置</label>
            <select id="sprite-pos" onchange="App.updateSpriteData()">
                <option value="left">左</option>
                <option value="right">右</option>
            </select>
        </div>
        <div class="sprite-row">
            <label>表情</label>
            <select id="sprite-expr" onchange="App.updateSpriteData()">
                <option value="default">標準</option>
                <option value="smile">笑顔</option>
                <option value="confused">困惑</option>
                <option value="surprised">驚き</option>
                <option value="shy">恥じらい</option>
                <option value="angry">怒り</option>
                <option value="sad">悲しみ</option>
                <option value="cry">泣き</option>
                <option value="gag">ギャグ</option>
            </select>
        </div>
        <div class="sprite-row">
            <label>アクション</label>
            <select id="sprite-action" onchange="App.updateSpriteData()">
                <option value="enter">(なし)</option>
                <option value="enter">登場</option>
                <option value="exit">退場</option>
            </select>
        </div>
    </div>

    <button id="btn-close-panel" onclick="App.closePanel()">完了</button>
</div>

<!-- ── コンテキストメニュー ──────────────────────────────── -->
<div id="ctx-menu-node">
    <div class="ctx-item" onclick="App.toggleLock()">🔒 ロック切替</div>
    <div class="ctx-item" onclick="App.copyNode()">📄 コピー</div>
    <div class="ctx-item danger" onclick="App.deleteNode()">🗑 削除</div>
</div>

<div id="ctx-menu-canvas">
    <div class="ctx-item" onclick="App.showLastEditedNode()">🧭 最後に編集したノードを表示</div>
    <div class="ctx-item" onclick="App.resetCameraCenter()">🎯 カメラを中央に戻す</div>
    <div class="ctx-item danger" onclick="App.deleteAllNodes()">🗑 すべて削除</div>
</div>

<!-- ── ステータスバー ──────────────────────────────────── -->
<div id="status-bar">
    <span id="st-nodes">ノード: 0</span>
    <span class="st-sep">|</span>
    <span id="st-edges">接続: 0</span>
    <span class="st-hint">クリック: 選択/接続　長押し: メニュー　Del: 削除　Ctrl+Z/Y: Undo/Redo</span>
</div>

<script>
// ════════════════════════════════════════════════════════
//  定数
// ════════════════════════════════════════════════════════
const CFG = Object.freeze({
    nodeW:         188,
    titleH:        33,
    lineH:         17,
    pad:           11,
    miniW:         200,
    miniH:         130,
    miniHideDelay: 1000,   // カメラ停止後にミニマップを隠すまでの ms
    animFit:       400,    // fitView のアニメーション時間 ms
    animMove:      320,    // moveTo のアニメーション時間 ms
    boundX:        4000,
    boundY:        3000,
    maxHistory:    50,
    maxFileBytes:  2 * 1024 * 1024,
    maxNodes:      500,
    maxEdges:      2000,
    maxStrLen:     5000,
    tempStorageKey:'scenario_manager_temp_data_v1',
});

const NODE_COLORS = Object.freeze({
    text:   '#2980b9',
    choice: '#c0392b',
    option: '#e67e22',
    sprite: '#7d3c98',
    locked: '#95a5a6',
});
const NODE_LABELS = Object.freeze({
    text:   'TEXT',
    choice: 'CHOICE',
    option: 'OPTION',
    sprite: 'SPRITE',
});
const ALLOWED_TYPES     = new Set(['text', 'choice', 'option', 'sprite']);
const VALID_EXPRESSIONS = new Set(['default','smile','confused','surprised','shy','angry','sad','cry','gag']);
const EXPR_JA = { default:'標準', smile:'笑顔', confused:'困惑', surprised:'驚き',
                  shy:'恥じらい', angry:'怒り', sad:'悲しみ', cry:'泣き', gag:'ギャグ' };

// ════════════════════════════════════════════════════════
//  立ち絵ノードの表示ラベルを生成する
// ════════════════════════════════════════════════════════
function buildSpriteLabel({ charName, spritePos, expression, spriteAction }) {
    const name   = charName    || '(名前未設定)';
    const pos    = spritePos   === 'right' ? '右' : '左';
    const expr   = EXPR_JA[expression]    ?? '標準';
    const action = spriteAction === 'exit' ? '退場' : '登場';
    return `${name}\n${pos} | ${expr}\n${action}`;
}

// ════════════════════════════════════════════════════════
//  描画ユーティリティ
// ════════════════════════════════════════════════════════
function roundRectPath(ctx, x, y, w, h, r) {
    ctx.beginPath();
    ctx.moveTo(x + r, y);        ctx.lineTo(x + w - r, y);
    ctx.arcTo(x + w, y,     x + w, y + r,     r);
    ctx.lineTo(x + w, y + h - r);
    ctx.arcTo(x + w, y + h, x + w - r, y + h, r);
    ctx.lineTo(x + r, y + h);
    ctx.arcTo(x,     y + h, x,       y + h - r, r);
    ctx.lineTo(x, y + r);
    ctx.arcTo(x,     y,     x + r,   y,         r);
    ctx.closePath();
}

/**
 * vis-network ctxRenderer ファクトリ。
 * shape:'custom' + ctxRenderer を使い描画座標と
 * バウンディングボックス（タップ判定）を完全に一致させる。
 */
function createCtxRenderer(nodesDS) {
    return function({ ctx, id, x, y, state: { selected } }) {
        const nd = nodesDS.get(id);
        if (!nd) return { drawNode() {}, nodeDimensions: { width: CFG.nodeW, height: 80 } };

        const { type = 'text', fixed = false } = nd;
        // sprite は buildSpriteLabel 由来の label、その他は rawText → label の順にフォールバック
        const displayText = type === 'sprite'
            ? (nd.label || '')
            : (nd.rawText || nd.label || '');
        const lines  = displayText.split('\n').slice(0, 4);
        const bodyH  = Math.max(50, lines.length * CFG.lineH + CFG.pad * 2);
        const H      = CFG.titleH + bodyH;
        const W      = CFG.nodeW;
        const lx     = x - W / 2;
        const ty     = y - H / 2;
        const color  = fixed ? NODE_COLORS.locked : (NODE_COLORS[type] || '#7f8c8d');

        return {
            drawNode() {
                // 影 + 背景
                ctx.save();
                ctx.shadowColor = 'rgba(0,0,0,0.12)'; ctx.shadowBlur = selected ? 14 : 8; ctx.shadowOffsetY = 3;
                ctx.fillStyle = selected ? '#f3eef9' : '#fff';
                roundRectPath(ctx, lx, ty, W, H, 8); ctx.fill();
                ctx.restore();

                // 外枠
                ctx.strokeStyle = selected ? color : color + 'aa';
                ctx.lineWidth   = selected ? 2.5 : 1.5;
                roundRectPath(ctx, lx, ty, W, H, 8); ctx.stroke();

                // タイトルバー（角丸クリップで枠外に出ないようにする）
                ctx.save();
                roundRectPath(ctx, lx, ty, W, H, 8); ctx.clip();
                ctx.fillStyle = color; ctx.fillRect(lx, ty, W, CFG.titleH);
                ctx.restore();

                // タイトルテキスト
                ctx.save();
                ctx.fillStyle = 'white'; ctx.font = 'bold 11px -apple-system,sans-serif';
                ctx.textBaseline = 'middle'; ctx.textAlign = 'left';
                ctx.fillText(NODE_LABELS[type] || 'NODE', lx + 10, ty + CFG.titleH / 2);
                if (fixed) { ctx.textAlign = 'right'; ctx.fillText('[locked]', lx + W - 8, ty + CFG.titleH / 2); }
                ctx.restore();

                // 本文テキスト
                ctx.save();
                ctx.fillStyle = '#444'; ctx.font = '12px -apple-system,sans-serif';
                ctx.textAlign = 'left'; ctx.textBaseline = 'top';
                lines.forEach((line, i) => {
                    if (line.length > 22) line = line.slice(0, 21) + '...';
                    ctx.fillText(line || ' ', lx + CFG.pad, ty + CFG.titleH + CFG.pad + i * CFG.lineH);
                });
                ctx.restore();
            },
            nodeDimensions: { width: W, height: H },
        };
    };
}

/**
 * JSON 保存 / Undo 復元時に関数は消えるため、
 * ロード後に必ずこの関数を通して renderer を再付与する。
 */
function attachRenderer(data, renderer) {
    const { ctxRenderer: _, shape: __, ...rest } = data;
    return { shape: 'custom', ctxRenderer: renderer, ...rest };
}

// ════════════════════════════════════════════════════════
//  入力検証 & サニタイズ (GitHub Pages 一般公開向け)
// ════════════════════════════════════════════════════════
function sanitizeStr(val, maxLen) {
    const s = typeof val === 'string' ? val : String(val ?? '');
    return s.replace(/[\x00-\x08\x0B\x0C\x0E-\x1F\x7F]/g, '').slice(0, maxLen);
}
function clampNum(v, lo, hi, fallback) {
    const n = Number(v); return isFinite(n) ? Math.max(lo, Math.min(hi, n)) : fallback;
}

function validateImport(raw) {
    if (raw.length > CFG.maxFileBytes)
        throw new Error('ファイルサイズが上限 (2 MB) を超えています');
    let data;
    try { data = JSON.parse(raw); } catch { throw new Error('JSON パースに失敗しました'); }

    if (typeof data !== 'object' || data === null || Array.isArray(data))
        throw new Error('トップレベルはオブジェクトが必要です');
    if (!Array.isArray(data.nodes)) throw new Error('"nodes" が配列ではありません');
    if (data.nodes.length > CFG.maxNodes)
        throw new Error(`ノード数が上限 (${CFG.maxNodes}) を超えています`);

    const knownIds = new Set();
    const nodes = data.nodes.map((n, i) => {
        if (typeof n !== 'object' || n === null) throw new Error(`nodes[${i}]: 不正な値`);
        const id = sanitizeStr(String(n.id ?? ''), 150);
        if (!id)             throw new Error(`nodes[${i}]: id が空です`);
        if (knownIds.has(id)) throw new Error(`nodes[${i}]: id "${id}" が重複しています`);
        knownIds.add(id);
        if (!ALLOWED_TYPES.has(n.type)) throw new Error(`nodes[${i}]: 不正な type "${n.type}"`);

        const out = {
            id,
            type:    n.type,
            rawText: sanitizeStr(n.rawText, CFG.maxStrLen),
            label:   sanitizeStr(n.label,   500),
            x:       clampNum(n.x, -CFG.boundX, CFG.boundX, 0),
            y:       clampNum(n.y, -CFG.boundY, CFG.boundY, 0),
            fixed:   Boolean(n.fixed),
        };
        if (n.type === 'choice') {
            out.childCount = clampNum(n.childCount, 1, 9, 2);
            if (Array.isArray(n.childIds))
                out.childIds = n.childIds.map(s => sanitizeStr(String(s), 150)).filter(Boolean).slice(0, 9);
            if (n.childOffsets && typeof n.childOffsets === 'object' && !Array.isArray(n.childOffsets))
                out.childOffsets = Object.fromEntries(
                    Object.entries(n.childOffsets)
                        .filter(([, v]) => v && typeof v === 'object')
                        .map(([k, v]) => [sanitizeStr(k, 150), {
                            x: clampNum(v.x, -2000, 2000, 240),
                            y: clampNum(v.y, -2000, 2000, 0),
                        }])
                );
        }
        if (n.type === 'sprite') {
            out.charName     = sanitizeStr(n.charName, 100);
            out.spritePos    = n.spritePos === 'right' ? 'right' : 'left';
            out.expression   = VALID_EXPRESSIONS.has(n.expression) ? n.expression : 'default';
            out.spriteAction = n.spriteAction === 'exit' ? 'exit' : 'enter';
            // label を再生成してインポートデータの整合性を保証
            out.label = buildSpriteLabel(out);
        }
        return out;
    });

    if (!Array.isArray(data.edges)) throw new Error('"edges" が配列ではありません');
    if (data.edges.length > CFG.maxEdges)
        throw new Error(`エッジ数が上限 (${CFG.maxEdges}) を超えています`);

    const edges = data.edges.map((e, i) => {
        if (typeof e !== 'object' || e === null) throw new Error(`edges[${i}]: 不正な値`);
        const from = sanitizeStr(String(e.from ?? ''), 150);
        const to   = sanitizeStr(String(e.to   ?? ''), 150);
        if (!knownIds.has(from)) throw new Error(`edges[${i}]: 存在しない from "${from}"`);
        if (!knownIds.has(to))   throw new Error(`edges[${i}]: 存在しない to "${to}"`);
        if (from === to)         throw new Error(`edges[${i}]: 自己ループは不可`);
        return { from, to };
    });

    return { nodes, edges };
}

// ════════════════════════════════════════════════════════
//  アプリ本体
// ════════════════════════════════════════════════════════
const App = (() => {

    // ── データ ────────────────────────────────────────
    const nodesDS = new vis.DataSet([]);
    const edgesDS = new vis.DataSet([]);
    let   network = null;

    // ── UI 状態 ───────────────────────────────────────
    let pendingFrom = null;   // 接続操作の待機中ノード ID
    let ctxTargetId = null;   // コンテキストメニューのターゲット
    let lastEditedNodeId = null; // 最後に編集したノード ID

    // ── 履歴 ──────────────────────────────────────────
    let undoStack = [], redoStack = [];

    // ── ミニマップ ─────────────────────────────────────
    const minimapEl  = document.getElementById('minimap');
    const minimapCtx = minimapEl.getContext('2d');
    let   minimapTimer  = null;
    let   minimapRafId  = null;   // RAF ループ管理

    // ── ctxRenderer ───────────────────────────────────
    let renderer = null;

    // ── 選択肢数セレクト初期化 ─────────────────────────
    const choiceNumSel = document.getElementById('choice-num');
    for (let i = 1; i <= 9; i++) choiceNumSel.add(new Option(i, i));

    // 現在の表示領域と画面幅に応じてCSS変数とモバイル判定クラスを更新し、スマホ表示時のUI崩れを防ぐ関数
    function applyResponsiveLayout() {
        const viewportHeight = window.visualViewport?.height ?? window.innerHeight;
        document.documentElement.style.setProperty('--app-height', `${Math.round(viewportHeight)}px`);
        document.body.classList.toggle('is-mobile', window.matchMedia('(max-width: 768px)').matches);
        network?.redraw();
    }

    // ════════════════════════════════════════════════
    //  ミニマップ
    //
    //  表示/非表示を RAF ループで管理する。
    //  visible クラスが付いている間は毎フレーム drawMinimap() を
    //  呼び続けることで、moveTo()/fit() のアニメーション中も
    //  ビューポート枠をリアルタイムで追従させる。
    // ════════════════════════════════════════════════

    function startMinimapLoop() {
        if (minimapRafId) return;  // 既にループ中
        const tick = () => {
            if (!minimapEl.classList.contains('visible')) {
                minimapRafId = null;
                return;
            }
            if (network) drawMinimap();
            minimapRafId = requestAnimationFrame(tick);
        };
        minimapRafId = requestAnimationFrame(tick);
    }

    function showMinimap() {
        clearTimeout(minimapTimer);
        minimapEl.classList.add('visible');
        startMinimapLoop();
    }

    function hideMinimap() {
        minimapEl.classList.remove('visible');
        // RAF ループは次の tick で自動停止
    }

    /** 操作終了後に miniHideDelay ms でミニマップを自動非表示 */
    function scheduleMinimap() {
        clearTimeout(minimapTimer);
        minimapTimer = setTimeout(hideMinimap, CFG.miniHideDelay);
    }

    /**
     * アニメーション付き移動（fitView / minimap クリック）の場合、
     * アニメーション時間が終わってから miniHideDelay ms 後に隠す。
     */
    function scheduleMinimapAfter(extraMs) {
        clearTimeout(minimapTimer);
        minimapTimer = setTimeout(hideMinimap, extraMs + CFG.miniHideDelay);
    }

    function drawMinimap() {
        const { miniW: W, miniH: H, boundX: BX, boundY: BY } = CFG;
        const toMX = nx => (nx + BX) / (BX * 2) * W;
        const toMY = ny => (ny + BY) / (BY * 2) * H;

        minimapCtx.clearRect(0, 0, W, H);

        // 背景
        minimapCtx.fillStyle = 'rgba(14,24,34,0.92)';
        roundRectPath(minimapCtx, 0, 0, W, H, 10); minimapCtx.fill();

        // 枠
        minimapCtx.strokeStyle = 'rgba(255,255,255,0.10)'; minimapCtx.lineWidth = 1;
        roundRectPath(minimapCtx, .5, .5, W - 1, H - 1, 10); minimapCtx.stroke();

        const positions = network.getPositions();

        // エッジ
        minimapCtx.strokeStyle = 'rgba(180,196,212,0.20)'; minimapCtx.lineWidth = 0.7;
        edgesDS.get().forEach(({ from, to }) => {
            const fp = positions[from], tp = positions[to];
            if (!fp || !tp) return;
            minimapCtx.beginPath();
            minimapCtx.moveTo(toMX(fp.x), toMY(fp.y));
            minimapCtx.lineTo(toMX(tp.x), toMY(tp.y));
            minimapCtx.stroke();
        });

        // ノード
        nodesDS.get().forEach(nd => {
            const p = positions[nd.id]; if (!p) return;
            minimapCtx.fillStyle = nd.fixed ? NODE_COLORS.locked : (NODE_COLORS[nd.type] || '#7f8c8d');
            minimapCtx.beginPath();
            minimapCtx.arc(toMX(p.x), toMY(p.y), nd.type === 'option' ? 2.2 : 3.2, 0, Math.PI * 2);
            minimapCtx.fill();
        });

        // ビューポート枠（現在見ている範囲を白い矩形で表示）
        const scale = network.getScale();
        const vp    = network.getViewPosition();
        const vw    = window.innerWidth  / scale;
        const vh    = window.innerHeight / scale;
        const rx = Math.max(1,     toMX(vp.x - vw / 2));
        const ry = Math.max(1,     toMY(vp.y - vh / 2));
        const rw = Math.min(W - rx - 1, vw / (BX * 2) * W);
        const rh = Math.min(H - ry - 1, vh / (BY * 2) * H);

        minimapCtx.strokeStyle = 'rgba(255,255,255,0.65)'; minimapCtx.lineWidth = 1.5;
        minimapCtx.strokeRect(rx, ry, Math.max(1, rw), Math.max(1, rh));

        // ラベル
        minimapCtx.fillStyle = 'rgba(255,255,255,0.25)';
        minimapCtx.font = 'bold 8px sans-serif';
        minimapCtx.textAlign = 'right'; minimapCtx.textBaseline = 'bottom';
        minimapCtx.fillText('MINIMAP', W - 6, H - 5);
    }

    // ミニマップをタップ → そこへカメラをジャンプ
    minimapEl.addEventListener('click', e => {
        if (!network) return;
        const rect = minimapEl.getBoundingClientRect();
        const mx   = (e.clientX - rect.left) / CFG.miniW;
        const my   = (e.clientY - rect.top)  / CFG.miniH;
        showMinimap();
        network.moveTo({
            position:  { x: mx * CFG.boundX * 2 - CFG.boundX, y: my * CFG.boundY * 2 - CFG.boundY },
            animation: { duration: CFG.animMove, easingFunction: 'easeInOutQuad' },
        });
        scheduleMinimapAfter(CFG.animMove);
    });

    // ════════════════════════════════════════════════
    //  スクロール制限
    // ════════════════════════════════════════════════
    function enforceBounds() {
        const { x, y } = network.getViewPosition();
        const cx = Math.max(-CFG.boundX, Math.min(CFG.boundX, x));
        const cy = Math.max(-CFG.boundY, Math.min(CFG.boundY, y));
        if (cx !== x || cy !== y)
            network.moveTo({ position: { x: cx, y: cy }, animation: { duration: 180, easingFunction: 'easeOutQuad' } });
    }

    // ════════════════════════════════════════════════
    //  Undo / Redo
    // ════════════════════════════════════════════════
    function snapshot() {
        const pos = network?.getPositions() ?? {};
        return JSON.stringify({
            nodes: nodesDS.get().map(({ ctxRenderer: _, shape: __, ...n }) => ({
                ...n, x: pos[n.id]?.x ?? n.x, y: pos[n.id]?.y ?? n.y,
            })),
            edges: edgesDS.get(),
        });
    }

    function saveState() {
        undoStack.push(snapshot());
        if (undoStack.length > CFG.maxHistory) undoStack.shift();
        redoStack = [];
        syncHistoryButtons();
    }

    // 一時データをローカルストレージに保存し、再読み込み時の編集復元に備える関数
    function persistTemporaryData() {
        try {
            localStorage.setItem(CFG.tempStorageKey, snapshot());
        } catch (err) {
            console.warn('一時データの保存に失敗しました:', err);
        }
    }

    // 一時データを削除し、手動保存やファイル読込後に古い復元データを残さないための関数
    function clearTemporaryData() {
        localStorage.removeItem(CFG.tempStorageKey);
    }

    // 画面読み込み時に一時データを復元し、未保存編集の消失を防ぐための関数
    function restoreTemporaryDataIfExists() {
        const tempJson = localStorage.getItem(CFG.tempStorageKey);
        if (!tempJson) return;
        try {
            const parsed = validateImport(tempJson);
            const restored = JSON.stringify(parsed);
            applySnapshot(restored);
            network.fit({ animation: true });
        } catch (err) {
            console.warn('一時データの復元に失敗したため削除しました:', err);
            clearTemporaryData();
        }
    }

    function applySnapshot(json) {
        const { nodes: ns, edges: es } = JSON.parse(json);
        nodesDS.clear(); edgesDS.clear();
        edgesDS.add(es ?? []);
        nodesDS.add((ns ?? []).map(n => attachRenderer(n, renderer)));
        pendingFrom = null; closePanel(); syncStatus();
    }

    function syncHistoryButtons() {
        document.getElementById('btn-undo').disabled = undoStack.length === 0;
        document.getElementById('btn-redo').disabled = redoStack.length === 0;
    }

    function undo() {
        if (!undoStack.length) return;
        redoStack.push(snapshot()); applySnapshot(undoStack.pop()); syncHistoryButtons();
    }
    function redo() {
        if (!redoStack.length) return;
        undoStack.push(snapshot()); applySnapshot(redoStack.pop()); syncHistoryButtons();
    }

    // ════════════════════════════════════════════════
    //  ノード操作
    // ════════════════════════════════════════════════
    function makeNode(data) { return attachRenderer(data, renderer); }

    function createNode(type) {
        saveState();
        const id     = `${type}_${Date.now()}`;
        const center = network.getViewPosition();
        const base   = { id, type, rawText: '', label: '...', x: center.x, y: center.y, fixed: false };

        if (type === 'sprite') {
            const defaults = { charName: '', spritePos: 'left', expression: 'default', spriteAction: 'enter' };
            Object.assign(base, defaults);
            base.label = buildSpriteLabel(defaults);
        }

        nodesDS.add(makeNode(base));
        if (type === 'choice') setTimeout(() => buildChoiceChildren(id, 2), 50);
        pendingFrom = id;
        markLastEditedNode(id);
        openPanel(nodesDS.get(id));
    }

    /**
     * CHOICE の子 OPTION を再構築する。
     * 既存の子を削除してから count 個生成し直す。
     */
    function buildChoiceChildren(parentId, count) {
        const parent = nodesDS.get(parentId); if (!parent) return;
        const pos    = network.getPositions([parentId])[parentId] ?? { x: 0, y: 0 };

        const oldIds = parent.childIds ?? [];
        if (oldIds.length) {
            nodesDS.remove(oldIds);
            edgesDS.remove(edgesDS.get({ filter: e => oldIds.includes(e.to) }).map(e => e.id));
        }

        const childIds = [], offsets = {};
        for (let i = 1; i <= count; i++) {
            const cid = `opt_${parentId}_${i}`;
            const ox  = 240, oy = (i - (count + 1) / 2) * 110;
            nodesDS.add(makeNode({ id: cid, type: 'option', rawText: `選択肢${i}`, label: `選択肢${i}`,
                x: pos.x + ox, y: pos.y + oy, fixed: false }));
            edgesDS.add({ from: parentId, to: cid });
            childIds.push(cid); offsets[cid] = { x: ox, y: oy };
        }
        nodesDS.update({ id: parentId, childIds, childOffsets: offsets, childCount: count });
    }

    function removeNode(id) {
        const n = nodesDS.get(id); if (!n) return;
        if (n.type === 'choice' && n.childIds?.length) {
            edgesDS.remove(edgesDS.get({ filter: e => n.childIds.includes(e.to) }).map(e => e.id));
            nodesDS.remove(n.childIds);
        }
        edgesDS.remove(edgesDS.get({ filter: e => e.from === id || e.to === id }).map(e => e.id));
        nodesDS.remove(id);
    }

    /**
     * エッジの追加 / 解除。
     * 方向は常に左から右（x 座標小 → 大）に統一する。
     * どちらのノードを先に選んでも同じエッジが対象になる。
     */
    function toggleEdge(aId, bId) {
        const pos = network.getPositions([aId, bId]);
        const [fromId, toId] = (pos[aId]?.x ?? 0) <= (pos[bId]?.x ?? 1) ? [aId, bId] : [bId, aId];
        const existing = edgesDS.get({ filter: e => e.from === fromId && e.to === toId });
        if (existing.length) edgesDS.remove(existing[0].id);
        else                 edgesDS.add({ from: fromId, to: toId });
    }

    // 全エッジの向きを左右位置に合わせて補正し、常に左ノードから右ノードへ向けるための関数
    function normalizeEdgesDirection() {
        const changedEdges = edgesDS.get().map(edge => {
            const pos = network.getPositions([edge.from, edge.to]);
            const fromX = pos[edge.from]?.x ?? 0;
            const toX = pos[edge.to]?.x ?? 0;
            if (fromX <= toX) return null;
            return { id: edge.id, from: edge.to, to: edge.from };
        }).filter(Boolean);
        if (changedEdges.length) edgesDS.update(changedEdges);
    }

    // ノード編集履歴を記録し、後で「最後に編集したノードへ移動」できるようにする関数
    function markLastEditedNode(id) {
        if (!id || !nodesDS.get(id)) return;
        lastEditedNodeId = id;
    }

    // ════════════════════════════════════════════════
    //  編集パネル
    // ════════════════════════════════════════════════
    function openPanel(node) {
        const isSprite = node.type === 'sprite';
        document.getElementById('panel-label').textContent = (NODE_LABELS[node.type] ?? 'NODE') + ' SETTINGS';
        document.getElementById('text-section').style.display   = isSprite ? 'none' : 'block';
        document.getElementById('sprite-section').style.display = isSprite ? 'flex'  : 'none';

        if (isSprite) {
            document.getElementById('sprite-name').value   = node.charName     ?? '';
            document.getElementById('sprite-pos').value    = node.spritePos    ?? 'left';
            document.getElementById('sprite-expr').value   = node.expression   ?? 'default';
            document.getElementById('sprite-action').value = node.spriteAction ?? 'enter';
        } else {
            document.getElementById('panel-text').value = node.rawText ?? '';
            const cc = document.getElementById('choice-config');
            cc.style.display = node.type === 'choice' ? 'flex' : 'none';
            if (node.type === 'choice') choiceNumSel.value = node.childCount ?? 2;
        }
        document.getElementById('edit-panel').classList.add('open');
        setTimeout(() => {
            const target = isSprite
                ? document.getElementById('sprite-name')
                : document.getElementById('panel-text');
            target?.focus();
        }, 300);
    }

    function closePanel() { document.getElementById('edit-panel').classList.remove('open'); }

    // ════════════════════════════════════════════════
    //  ステータスバー
    // ════════════════════════════════════════════════
    function syncStatus() {
        document.getElementById('st-nodes').textContent = `ノード: ${nodesDS.length}`;
        document.getElementById('st-edges').textContent = `接続: ${edgesDS.length}`;
    }

    // ════════════════════════════════════════════════
    //  コンテキストメニュー
    // ════════════════════════════════════════════════
    const nodeCtxMenuEl = document.getElementById('ctx-menu-node');
    const canvasCtxMenuEl = document.getElementById('ctx-menu-canvas');

    // ノード向けコンテキストメニューを表示し、対象ノード操作を実行できるようにする関数
    function showNodeCtxMenu(nodeId, domX, domY) {
        hideCtxMenu();
        ctxTargetId = nodeId;
        Object.assign(nodeCtxMenuEl.style, { display: 'flex', left: `${domX}px`, top: `${domY}px` });
    }

    // キャンバス向けコンテキストメニューを表示し、全体操作を実行できるようにする関数
    function showCanvasCtxMenu(domX, domY) {
        hideCtxMenu();
        ctxTargetId = null;
        Object.assign(canvasCtxMenuEl.style, { display: 'flex', left: `${domX}px`, top: `${domY}px` });
    }

    // すべてのコンテキストメニューを閉じ、重複表示を防ぐための関数
    function hideCtxMenu() {
        nodeCtxMenuEl.style.display = 'none';
        canvasCtxMenuEl.style.display = 'none';
    }

    // ════════════════════════════════════════════════
    //  vis-network 初期化
    // ════════════════════════════════════════════════
    function init() {
        renderer = createCtxRenderer(nodesDS);
        applyResponsiveLayout();

        window.addEventListener('resize', applyResponsiveLayout);
        window.addEventListener('orientationchange', applyResponsiveLayout);
        window.visualViewport?.addEventListener('resize', applyResponsiveLayout);

        network = new vis.Network(
            document.getElementById('network'),
            { nodes: nodesDS, edges: edgesDS },
            {
                nodes: { shape: 'custom', ctxRenderer: renderer },
                edges: {
                    arrows: { to: { enabled: true, scaleFactor: .75 } },
                    color:  { color: '#b0bec5', highlight: '#2980b9', hover: '#78909c' },
                    smooth: { type: 'cubicBezier', forceDirection: 'horizontal', roundness: .4 },
                    width: 1.5, hoverWidth: 2,
                },
                physics: { enabled: false },
                // multiselect: false で複数ノードの意図しない一括ドラッグを防ぐ
                interaction: { hover: true, multiselect: false, dragView: true, zoomView: true },
            }
        );

        // ── ドラッグ中: ミニマップ表示 & CHOICE 子追従 ──────────
        network.on('dragging', ({ nodes: nds }) => {
            showMinimap();
            if (!nds.length) return;
            const parent = nodesDS.get(nds[0]);
            if (!parent || parent.type !== 'choice' || !parent.childIds?.length) return;
            const pPos = network.getPositions([nds[0]])[nds[0]];
            nodesDS.update(parent.childIds.map(cid => {
                const off = parent.childOffsets?.[cid] ?? { x: 240, y: 0 };
                return { id: cid, x: pPos.x + off.x, y: pPos.y + off.y };
            }));
        });

        // ── ドラッグ終了: OPTION のオフセット更新 & 後処理 ─────
        network.on('dragEnd', ({ nodes: nds }) => {
            scheduleMinimap(); enforceBounds();
            normalizeEdgesDirection();
            if (!nds.length) return;
            const moved = nodesDS.get(nds[0]);
            if (moved?.type !== 'option') return;
            const parentEdge = edgesDS.get({ filter: e => e.to === nds[0] })[0];
            if (!parentEdge) return;
            const parent = nodesDS.get(parentEdge.from);
            if (!parent || parent.type !== 'choice') return;
            const pos = network.getPositions([parent.id, nds[0]]);
            nodesDS.update({ id: parent.id, childOffsets: {
                ...(parent.childOffsets ?? {}),
                [nds[0]]: { x: pos[nds[0]].x - pos[parent.id].x, y: pos[nds[0]].y - pos[parent.id].y },
            }});
        });

        // ── ズーム: ミニマップ表示 & 範囲制限 ─────────────────
        network.on('zoom', () => { showMinimap(); scheduleMinimap(); enforceBounds(); });

        // ── クリック: 接続操作 ──────────────────────────────────
        network.on('click', ({ nodes: nds }) => {
            hideCtxMenu(); hideMinimap();
            const id = nds[0];
            if (id) {
                if (pendingFrom && pendingFrom !== id) {
                    saveState(); toggleEdge(pendingFrom, id);
                    pendingFrom = null; closePanel();
                } else {
                    pendingFrom = id;
                    const nd = nodesDS.get(id);
                    if (nd && !nd.fixed) openPanel(nd);
                }
            } else {
                pendingFrom = null; closePanel();
            }
        });

        // ── 長押し: コンテキストメニュー ───────────────────────
        network.on('hold', ({ nodes: nds, pointer }) => {
            if (nds.length) {
                showNodeCtxMenu(nds[0], pointer.DOM.x, pointer.DOM.y);
                return;
            }
            showCanvasCtxMenu(pointer.DOM.x, pointer.DOM.y);
        });

        nodesDS.on('*', syncStatus);
        edgesDS.on('*', syncStatus);
        nodesDS.on('*', persistTemporaryData);
        edgesDS.on('*', persistTemporaryData);
        syncStatus();
        restoreTemporaryDataIfExists();
    }

    // ════════════════════════════════════════════════
    //  ナビゲーション
    // ════════════════════════════════════════════════
    function fitView() {
        showMinimap();
        const anim = { duration: CFG.animFit, easingFunction: 'easeInOutQuad' };
        nodesDS.length
            ? network.fit({ animation: anim })
            : network.moveTo({ position: { x: 0, y: 0 }, scale: 1, animation: anim });
        scheduleMinimapAfter(CFG.animFit);
    }

    // ════════════════════════════════════════════════
    //  Dialogic JSON エクスポート
    //
    //  グラフを DAG として左→右に走査し、Dialogic 2.x の
    //  イベント構造に対応した JSON を生成する。
    //  Godot 側でこの JSON を読み込む GDScript インポーターが必要。
    //  (README 参照)
    // ════════════════════════════════════════════════
    function exportDialogic() {
        // 隣接マップを構築
        const outgoing = new Map(), incoming = new Map();
        nodesDS.get().forEach(n => { outgoing.set(n.id, []); incoming.set(n.id, []); });
        edgesDS.get().forEach(e => {
            outgoing.get(e.from)?.push(e.to);
            incoming.get(e.to)?.push(e.from);
        });

        // ルートノード: 入次数 0 かつ option 以外、x 座標順
        const roots = nodesDS.get()
            .filter(n => n.type !== 'option' && !(incoming.get(n.id)?.length))
            .sort((a, b) => (a.x ?? 0) - (b.x ?? 0));

        if (!roots.length) { alert('スタートノードが見つかりません'); return; }

        const timelines   = [];
        const globalVisit = new Set();  // 同一ノードの重複処理を防ぐ

        function buildTimeline(startId, timelineId) {
            const events = [];
            let current  = startId;
            const localVisit = new Set();

            while (current) {
                // 循環検出: 既訪問ならジャンプイベントを挿入して終了
                if (localVisit.has(current) || globalVisit.has(current)) {
                    events.push({ event_type: 'dialogic_jump', timeline: `timeline_${current}` });
                    break;
                }
                localVisit.add(current); globalVisit.add(current);

                const nd = nodesDS.get(current); if (!nd) break;

                if (nd.type === 'text') {
                    events.push({ event_type: 'dialogic_text', text: nd.rawText || '' });

                } else if (nd.type === 'sprite') {
                    events.push({
                        event_type: 'dialogic_character',
                        character:  nd.charName    || '',
                        portrait:   nd.expression  || 'default',
                        position:   nd.spritePos   || 'left',
                        action:     nd.spriteAction === 'exit' ? 'leave' : 'join',
                    });

                } else if (nd.type === 'choice') {
                    const options = (nd.childIds || []).map(optId => {
                        const optNode = nodesDS.get(optId);
                        const nextId  = (outgoing.get(optId) || [])[0] ?? null;
                        let   nextTimeline = null;
                        if (nextId && !globalVisit.has(nextId)) {
                            nextTimeline = `timeline_${optId}`;
                            buildTimeline(nextId, nextTimeline);  // 再帰で分岐タイムラインを生成
                        } else if (nextId) {
                            nextTimeline = `timeline_${nextId}`;  // 既訪問 → ジャンプ参照
                        }
                        return { text: optNode?.rawText || '', timeline: nextTimeline };
                    });
                    events.push({ event_type: 'dialogic_choice', question: nd.rawText || '', options });
                    break;  // CHOICE でタイムラインを終了（分岐は再帰処理済み）
                }

                // 次ノード（option は飛ばす）
                const nexts = (outgoing.get(current) || [])
                    .map(id => nodesDS.get(id))
                    .filter(n => n && n.type !== 'option')
                    .map(n => n.id);
                current = nexts[0] ?? null;
            }

            timelines.push({ id: timelineId, events });
        }

        roots.forEach((root, i) => {
            if (!globalVisit.has(root.id))
                buildTimeline(root.id, i === 0 ? 'main' : `timeline_${root.id}`);
        });

        const output = {
            _format:  'scenario_architect_dialogic_v1',
            _note:    'Dialogic 2.x (Godot 4.x) 用。GDScript インポーターと組み合わせて使用してください。README を参照。',
            timelines,
        };
        download(URL.createObjectURL(
            new Blob([JSON.stringify(output, null, 2)], { type: 'application/json' })
        ), `dialogic_${isoDate()}.json`);
    }

    // ════════════════════════════════════════════════
    //  通常の JSON 保存 / 読込 / 画像出力
    // ════════════════════════════════════════════════
    function download(href, filename) {
        const a = Object.assign(document.createElement('a'), { href, download: filename });
        document.body.appendChild(a); a.click(); a.remove();
    }
    function isoDate() { return new Date().toISOString().slice(0, 10); }

    function exportJson() {
        const pos = network.getPositions();
        const ns  = nodesDS.get().map(({ ctxRenderer: _, shape: __, ...n }) => ({
            ...n, x: pos[n.id]?.x ?? n.x, y: pos[n.id]?.y ?? n.y,
        }));
        clearTemporaryData();
        download(URL.createObjectURL(
            new Blob([JSON.stringify({ nodes: ns, edges: edgesDS.get() }, null, 2)], { type: 'application/json' })
        ), `scenario_${isoDate()}.json`);
    }

    function importJson(event) {
        const file = event.target.files[0]; if (!file) return;
        event.target.value = '';
        const reader = new FileReader();
        reader.onload = ev => {
            try {
                const { nodes: ns, edges: es } = validateImport(ev.target.result);
                saveState();
                nodesDS.clear(); edgesDS.clear();
                edgesDS.add(es); nodesDS.add(ns.map(n => makeNode(n)));
                clearTemporaryData();
                network.fit({ animation: true });
            } catch (err) { alert('読込エラー\n\n' + err.message); }
        };
        reader.readAsText(file);
    }

    function exportImage() {
        download(network.canvas.frame.canvas.toDataURL('image/png'), `scenario_${isoDate()}.png`);
    }

    // ════════════════════════════════════════════════
    //  キーボードショートカット
    // ════════════════════════════════════════════════
    document.addEventListener('keydown', e => {
        if (['TEXTAREA','INPUT','SELECT'].includes(e.target.tagName)) return;
        const ctrl = e.ctrlKey || e.metaKey;
        if ((e.key === 'Delete' || e.key === 'Backspace') && pendingFrom) {
            saveState(); const id = pendingFrom;
            pendingFrom = null; closePanel(); removeNode(id);
        }
        if (ctrl && !e.shiftKey && e.key === 'z') { e.preventDefault(); undo(); }
        if (ctrl && (e.key === 'y' || (e.shiftKey && e.key === 'z'))) { e.preventDefault(); redo(); }
    });
    document.addEventListener('click', e => {
        if (!nodeCtxMenuEl.contains(e.target) && !canvasCtxMenuEl.contains(e.target)) hideCtxMenu();
    });

    // ════════════════════════════════════════════════
    //  公開 API (HTML の onclick から呼び出す)
    // ════════════════════════════════════════════════
    return {
        init,
        // 新規ノードを作成し、編集対象として開く関数
        createNode,
        closePanel,
        // テキストノードの内容を更新し、最新編集ノードとして記録する関数
        updateNodeText() {
            if (!pendingFrom) return;
            const text = document.getElementById('panel-text').value;
            nodesDS.update({ id: pendingFrom, rawText: text, label: text || ' ' });
            markLastEditedNode(pendingFrom);
        },
        // 立ち絵ノードの設定を更新し、最新編集ノードとして記録する関数
        updateSpriteData() {
            if (!pendingFrom) return;
            const data = {
                charName:     document.getElementById('sprite-name').value,
                spritePos:    document.getElementById('sprite-pos').value,
                expression:   document.getElementById('sprite-expr').value,
                spriteAction: document.getElementById('sprite-action').value,
            };
            data.label = buildSpriteLabel(data);
            nodesDS.update({ id: pendingFrom, ...data });
            markLastEditedNode(pendingFrom);
        },
        syncChoices() { saveState(); buildChoiceChildren(pendingFrom, parseInt(choiceNumSel.value)); },
        toggleLock() {
            if (!ctxTargetId) return; saveState();
            const n = nodesDS.get(ctxTargetId);
            nodesDS.update({ id: ctxTargetId, fixed: !n.fixed });
            hideCtxMenu(); closePanel();
        },
        copyNode() {
            const n = nodesDS.get(ctxTargetId); if (!n || n.type === 'option') return;
            saveState();
            const pos   = network.getPositions([ctxTargetId])[ctxTargetId];
            const newId = `${n.type}_${Date.now()}_cp`;
            const copy  = { id: newId, type: n.type, rawText: n.rawText, label: n.label,
                            x: pos.x + 30, y: pos.y + 30, fixed: false };
            // sprite 固有フィールドをコピー
            if (n.type === 'sprite')
                Object.assign(copy, { charName: n.charName, spritePos: n.spritePos,
                                      expression: n.expression, spriteAction: n.spriteAction });
            nodesDS.add(makeNode(copy));
            if (n.type === 'choice') setTimeout(() => buildChoiceChildren(newId, n.childCount ?? 2), 50);
            markLastEditedNode(newId);
            hideCtxMenu();
        },
        // ノード削除時に確認ダイアログを表示し、誤削除を防ぐための関数
        deleteNode() {
            if (!ctxTargetId) return;
            if (!confirm('本当によろしいですか？')) return;
            saveState();
            const id = ctxTargetId;
            if (pendingFrom === id) { pendingFrom = null; closePanel(); }
            if (lastEditedNodeId === id) lastEditedNodeId = null;
            removeNode(id); hideCtxMenu();
        },
        // 最後に編集したノードへカメラ移動し、編集再開しやすくする関数
        showLastEditedNode() {
            if (!lastEditedNodeId || !nodesDS.get(lastEditedNodeId)) {
                hideCtxMenu();
                return;
            }
            const pos = network.getPositions([lastEditedNodeId])[lastEditedNodeId];
            if (!pos) {
                hideCtxMenu();
                return;
            }
            showMinimap();
            network.moveTo({
                position: pos,
                animation: { duration: CFG.animMove, easingFunction: 'easeInOutQuad' },
            });
            scheduleMinimapAfter(CFG.animMove);
            pendingFrom = lastEditedNodeId;
            const nd = nodesDS.get(lastEditedNodeId);
            if (nd && !nd.fixed) openPanel(nd);
            hideCtxMenu();
        },
        // カメラをワールド中央へ戻し、迷子になった際の復帰を容易にする関数
        resetCameraCenter() {
            showMinimap();
            network.moveTo({
                position: { x: 0, y: 0 },
                animation: { duration: CFG.animMove, easingFunction: 'easeInOutQuad' },
            });
            scheduleMinimapAfter(CFG.animMove);
            hideCtxMenu();
        },
        // 全ノード削除前に確認を挟み、意図しない全消去を防ぐための関数
        deleteAllNodes() {
            if (!confirm('本当によろしいですか？')) return;
            saveState();
            nodesDS.clear();
            edgesDS.clear();
            pendingFrom = null;
            ctxTargetId = null;
            lastEditedNodeId = null;
            closePanel();
            hideCtxMenu();
        },
        undo, redo, fitView,
        exportJson, importJson, exportImage, exportDialogic,
    };
})();

App.init();
</script>
</body>
</html>
